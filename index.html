<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>benfuller.co.uk</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&family=DM+Serif+Display&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:     #f0efed;
      --text:   #1a1a1a;
      --muted:  #999;
      --border: #e0deda;
      --gap:    10px;
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ── TITLE ── */
    .title-wrap {
      display: flex;
      justify-content: center;
      padding: 32px 20px 24px;
      position: relative;
      z-index: 10;
    }

    .title-box {
      background: #fff;
      padding: 14px 32px;
      box-shadow: 0 2px 16px rgba(0,0,0,0.08);
      text-align: center;
    }

    .title-box h1 {
      font-family: 'DM Serif Display', serif;
      font-size: clamp(1.2rem, 3vw, 1.8rem);
      font-weight: 400;
      letter-spacing: -0.01em;
      color: var(--text);
      line-height: 1;
    }

    .title-box p {
      font-size: 0.72rem;
      color: var(--muted);
      margin-top: 5px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    /* ── STATUS ── */
    .status {
      text-align: center;
      padding: 80px 20px;
      color: var(--muted);
      font-size: 0.9rem;
    }

    .spinner {
      width: 26px; height: 26px;
      border: 2px solid var(--border);
      border-top-color: var(--text);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin: 0 auto 14px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── MASONRY GRID ── */
    .gallery {
      columns: 5 180px;
      column-gap: var(--gap);
      padding: 0 var(--gap) var(--gap);
    }

    .gallery-item {
      break-inside: avoid;
      margin-bottom: var(--gap);
      overflow: hidden;
      cursor: pointer;
      position: relative;
      background: var(--border);
    }

    .gallery-item img {
      width: 100%;
      display: block;
      opacity: 0;
      transition: opacity 0.35s ease, transform 0.4s ease;
    }

    .gallery-item img.loaded { opacity: 1; }

    .gallery-item:hover img { transform: scale(1.04); }

    /* ── LIGHTBOX ── */
    .lightbox {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.88);
      z-index: 1000;
      align-items: center;
      justify-content: center;
      padding: 24px;
      cursor: pointer;
    }

    .lightbox.open { display: flex; }

    .lb-img-wrap {
      position: relative;
      cursor: default;
      max-width: 100%;
      max-height: 90vh;
      animation: lbIn 0.22s ease;
    }

    @keyframes lbIn {
      from { opacity: 0; transform: scale(0.95); }
      to   { opacity: 1; transform: scale(1); }
    }

    .lightbox img {
      max-width: 90vw;
      max-height: 88vh;
      object-fit: contain;
      display: block;
    }

    .lb-close {
      position: absolute;
      top: -14px;
      right: -14px;
      width: 32px; height: 32px;
      background: #fff;
      border: none;
      border-radius: 50%;
      font-size: 1.1rem;
      line-height: 1;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text);
      box-shadow: 0 2px 8px rgba(0,0,0,0.25);
      transition: background 0.2s;
      z-index: 10;
    }

    .lb-close:hover { background: #eee; }

    .lb-nav {
      position: fixed;
      top: 50%;
      transform: translateY(-50%);
      background: rgba(255,255,255,0.12);
      border: none;
      color: rgba(255,255,255,0.8);
      font-size: 1.6rem;
      width: 46px; height: 46px;
      cursor: pointer;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s;
    }

    .lb-nav:hover { background: rgba(255,255,255,0.22); }
    .lb-prev { left: 14px; }
    .lb-next { right: 14px; }

    /* ── RESPONSIVE ── */
    @media (max-width: 500px) {
      .gallery { columns: 2 140px; }
      .lb-nav { display: none; }
    }
  </style>
</head>
<body>

  <!-- TITLE -->
  <div class="title-wrap">
    <div class="title-box">
      <h1>Ben Fuller</h1>
      <p>photos &amp; things</p>
    </div>
  </div>

  <!-- STATUS -->
  <div class="status" id="status">
    <div class="spinner"></div>
    <p>Loading…</p>
  </div>

  <!-- GALLERY -->
  <div class="gallery" id="gallery"></div>

  <!-- LIGHTBOX -->
  <div class="lightbox" id="lightbox">
    <button class="lb-nav lb-prev" id="lb-prev">&#8249;</button>
    <div class="lb-img-wrap" id="lb-wrap">
      <button class="lb-close" id="lb-close">&times;</button>
      <img src="" id="lb-img" alt="" />
    </div>
    <button class="lb-nav lb-next" id="lb-next">&#8250;</button>
  </div>

  <script>
    const GITHUB_USER = 'chiefmate8';
    const GITHUB_REPO = 'gallery';
    const API_URL     = `https://api.github.com/repos/${GITHUB_USER}/${GITHUB_REPO}/contents/images`;
    const RAW_BASE    = `https://raw.githubusercontent.com/${GITHUB_USER}/${GITHUB_REPO}/main/images`;

    let photos       = [];
    let currentIndex = 0;

    // ── FETCH ──
    async function loadPhotos() {
      try {
        const res = await fetch(API_URL, {
          headers: { Accept: 'application/vnd.github.v3+json' }
        });

        if (!res.ok) throw new Error('Failed to fetch');

        const files = await res.json();
        photos = files
          .filter(f => /\.(jpe?g|png|gif|webp)$/i.test(f.name))
          .map(f => ({ src: `${RAW_BASE}/${f.name}`, name: f.name }));

        document.getElementById('status').style.display = 'none';

        if (photos.length === 0) {
          document.getElementById('status').style.display = 'block';
          document.getElementById('status').innerHTML = '<p>No photos yet!</p>';
          return;
        }

        renderGallery();

      } catch (e) {
        document.getElementById('status').innerHTML = '<p>Could not load photos.</p>';
      }
    }

    // ── RENDER ──
    function renderGallery() {
      const gallery = document.getElementById('gallery');
      gallery.innerHTML = '';

      photos.forEach((photo, i) => {
        const item = document.createElement('div');
        item.className = 'gallery-item';

        const img = document.createElement('img');
        img.src = photo.src;
        img.alt = photo.name;
        img.loading = 'lazy';
        img.onload = () => img.classList.add('loaded');

        item.appendChild(img);
        item.addEventListener('click', () => openLightbox(i));
        gallery.appendChild(item);
      });
    }

    // ── LIGHTBOX ──
    function openLightbox(index) {
      currentIndex = index;
      document.getElementById('lb-img').src = photos[currentIndex].src;
      document.getElementById('lightbox').classList.add('open');
      document.body.style.overflow = 'hidden';
    }

    function closeLightbox() {
      document.getElementById('lightbox').classList.remove('open');
      document.body.style.overflow = '';
    }

    function prev() {
      currentIndex = (currentIndex - 1 + photos.length) % photos.length;
      document.getElementById('lb-img').src = photos[currentIndex].src;
    }

    function next() {
      currentIndex = (currentIndex + 1) % photos.length;
      document.getElementById('lb-img').src = photos[currentIndex].src;
    }

    // Close on backdrop click
    document.getElementById('lightbox').addEventListener('click', e => {
      if (e.target === document.getElementById('lightbox')) closeLightbox();
    });

    document.getElementById('lb-close').addEventListener('click', closeLightbox);
    document.getElementById('lb-prev').addEventListener('click', prev);
    document.getElementById('lb-next').addEventListener('click', next);

    document.addEventListener('keydown', e => {
      if (!document.getElementById('lightbox').classList.contains('open')) return;
      if (e.key === 'Escape')      closeLightbox();
      if (e.key === 'ArrowLeft')   prev();
      if (e.key === 'ArrowRight')  next();
    });

    loadPhotos();
  </script>

</body>
</html>
